<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairTrust AI · Model Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1A2D4E;        /* deep navy */
            --secondary: #EBB255;       /* warm gold */
            --accent: #4A90E2;           /* soft blue (accents) */
            --light-bg: #F8F9FA;
            --light-text: #5A6169;
            --white: #FFFFFF;
            --shadow: 0 10px 30px rgba(26, 45, 78, 0.08);
            --border-light: #E9ECEF;
            --success: #2E7D32;          /* green for scores */
            --warning: #ED6C02;           /* deeper orange */
            --danger: #D32F2F;            /* red */
            --surface: #FFFFFF;
            --text: #1A2D4E;
            --text-muted: #5A6169;
            --radius: 16px;
            --transition: all 0.25s ease;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--light-bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* ----- NAVBAR (FairTrust style) ----- */
        .navbar {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 16px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 1000;
            border-bottom: 1px solid rgba(235,178,85,0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--primary);
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(26,45,78,0.2);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
        }
        .logo-text span { color: var(--secondary); }

        .logo-subtitle {
            font-size: 12px;
            font-weight: 500;
            color: var(--secondary);
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: var(--primary);
            position: relative;
            padding-bottom: 4px;
            font-size: 15px;
            transition: var(--transition);
        }
        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
            transition: width 0.3s;
        }
        .nav-links a:hover { color: var(--secondary); }
        .nav-links a:hover:after { width: 100%; }
        .nav-links a.active { color: var(--secondary); }
        .nav-links a.active:after { width: 100%; }

        /* ----- MAIN LAYOUT ----- */
        .comparison-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }
        .page-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 70px;
            height: 4px;
            background: var(--secondary);
            border-radius: 2px;
        }

        /* Cards */
        .section-card {
            background: var(--white);
            border: 1px solid rgba(235,178,85,0.15);
            border-radius: var(--radius);
            padding: 1.75rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .section-card:hover {
            box-shadow: 0 15px 40px rgba(26,45,78,0.12);
            border-color: rgba(235,178,85,0.3);
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            color: var(--secondary);
            font-size: 1.4rem;
        }

        /* Version selector */
        .version-selector {
            display: flex;
            gap: 2rem;
            align-items: flex-end;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: var(--light-bg);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
        }
        .select-group {
            flex: 1;
            min-width: 220px;
        }
        .select-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .version-select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            background: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--primary);
            transition: var(--transition);
            cursor: pointer;
        }
        .version-select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(235,178,85,0.2);
        }
        .vs-badge {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary);
            padding-bottom: 0.5rem;
        }
        .compare-btn {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, var(--primary), #2C3F62);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
            box-shadow: 0 8px 18px rgba(26,45,78,0.2);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .compare-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(26,45,78,0.3);
            background: linear-gradient(135deg, #1F3452, #1A2D4E);
        }

        /* Comparison grid */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .model-card {
            background: var(--light-bg);
            border: 2px solid rgba(235,178,85,0.15);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: var(--transition);
        }
        .model-card:hover {
            border-color: var(--secondary);
        }
        .model-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .model-id {
            font-size: 1rem;
            font-weight: 700;
            font-family: monospace;
            background: rgba(26,45,78,0.05);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            color: var(--primary);
            border: 1px solid rgba(235,178,85,0.2);
        }
        .model-records {
            color: var(--text-muted);
            font-size: 0.85rem;
            background: white;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }
        .model-score {
            text-align: center;
            padding: 1rem 0;
        }
        .model-score-val {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }
        .model-score-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dim-bars {
            margin-top: 1.2rem;
        }
        .dim-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.7rem;
        }
        .dim-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            width: 120px;
            flex-shrink: 0;
        }
        .dim-bar-track {
            flex: 1;
            height: 8px;
            background: var(--border-light);
            border-radius: 20px;
            overflow: hidden;
        }
        .dim-bar-fill {
            height: 100%;
            background: var(--secondary);
            border-radius: 20px;
            width: 0;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .dim-val {
            font-size: 0.8rem;
            font-weight: 700;
            width: 40px;
            text-align: right;
            color: var(--primary);
        }

        /* Comparison table */
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin: 1.5rem 0;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            overflow: hidden;
        }
        .comparison-table th {
            background: var(--primary);
            color: white;
            font-weight: 600;
            padding: 0.8rem 1rem;
            text-align: left;
            font-size: 0.85rem;
        }
        .comparison-table td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border-light);
            background: white;
        }
        .comparison-table tr:last-child td { border-bottom: none; }
        .improvement { color: var(--success); font-weight: 700; }
        .regression  { color: var(--danger); font-weight: 700; }
        .neutral     { color: var(--text-muted); font-weight: 500; }

        /* Verdict card */
        .verdict {
            text-align: center;
            padding: 1.5rem;
            background: var(--light-bg);
            border-radius: var(--radius);
            border: 2px solid rgba(235,178,85,0.2);
            margin-top: 1.5rem;
        }
        .verdict h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .verdict p {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .verdict-badge {
            display: inline-block;
            padding: 0.5rem 2rem;
            background: var(--secondary);
            color: var(--primary);
            font-weight: 800;
            border-radius: 40px;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(235,178,85,0.3);
        }

        /* Radar container */
        .radar-container {
            margin-top: 2.5rem;
            padding: 2rem;
            background: var(--light-bg);
            border-radius: var(--radius);
            border: 2px solid rgba(235,178,85,0.15);
        }
        .radar-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .radar-wrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
        }
        .radar-canvas {
            width: 400px;
            height: 400px;
            max-width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }
        .radar-legend {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }
        .legend-color.A { background: rgba(26,45,78,0.25); border: 2px solid var(--primary); }
        .legend-color.B { background: rgba(235,178,85,0.25); border: 2px solid var(--secondary); }

        /* History timeline */
        .trend-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 100px;
            margin: 1rem 0;
            padding: 1rem 0.5rem 0;
            background: var(--light-bg);
            border-radius: 12px;
            border: 1px solid var(--border-light);
        }
        .trend-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 6px 6px 0 0;
            transition: height 0.4s;
            min-width: 8px;
        }
        .trend-labels {
            display: flex;
            gap: 4px;
            padding: 0 0.5rem;
        }
        .trend-label {
            flex: 1;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }
        .timeline-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.2rem 1.5rem;
            background: white;
            border: 2px solid rgba(235,178,85,0.1);
            border-radius: 14px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .timeline-item:hover {
            transform: translateX(6px);
            border-color: var(--secondary);
            box-shadow: var(--shadow);
        }
        .timeline-left {
            min-width: 90px;
        }
        .timeline-index {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--secondary);
            text-transform: uppercase;
        }
        .timeline-score {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .timeline-content {
            flex: 1;
        }
        .timeline-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.2rem;
        }
        .timeline-trigger {
            display: inline-block;
            padding: 0.2rem 1rem;
            background: rgba(235,178,85,0.1);
            color: var(--secondary);
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            border: 1px solid rgba(235,178,85,0.3);
        }
        .timeline-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .improvement-badge { color: var(--success); font-weight: 700; }
        .regression-badge  { color: var(--danger); font-weight: 700; }

        /* Alerts */
        .alerts-summary {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .alert-chip {
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            background: white;
            border: 2px solid transparent;
        }
        .alert-chip.critical { background: #FFEBEE; color: var(--danger); border-color: var(--danger); }
        .alert-chip.warning  { background: #FFF3E0; color: #ED6C02; border-color: #ED6C02; }
        .alert-chip.resolved { background: #E8F5E9; color: var(--success); border-color: var(--success); }
        .alert-chip.neutral  { background: var(--light-bg); color: var(--text-muted); border-color: var(--border-light); }

        .alert-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: white;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            border-left: 6px solid;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .alert-item.critical { border-left-color: var(--danger); }
        .alert-item.warning  { border-left-color: #ED6C02; }
        .alert-item.info     { border-left-color: var(--accent); }
        .alert-item.resolved { border-left-color: var(--success); opacity: 0.8; }
        .alert-message { font-weight: 600; margin-bottom: 0.2rem; }
        .alert-meta { font-size: 0.8rem; color: var(--text-muted); }
        .severity-badge {
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
        }
        .severity-badge.critical { background: var(--danger); }
        .severity-badge.warning  { background: #ED6C02; }
        .severity-badge.info     { background: var(--accent); }
        .severity-badge.resolved { background: var(--success); }

        /* Buttons */
        .export-options {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 6px 14px rgba(26,45,78,0.25);
        }
        .btn-primary:hover {
            background: #0F1E38;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: white;
            border: 2px solid var(--secondary);
            color: var(--primary);
        }
        .btn-secondary:hover {
            background: var(--secondary);
            color: var(--primary);
            border-color: var(--secondary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            background: var(--light-bg);
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .comparison-grid { grid-template-columns: 1fr; }
            .version-selector { flex-direction: column; align-items: stretch; }
            .vs-badge { display: none; }
            .radar-wrapper { flex-direction: column; }
            .navbar { padding: 12px 5%; }
            .nav-links { gap: 16px; }
        }
    </style>
</head>
<body>
    <!-- FairTrust Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <div>
                <div class="logo-text">Fair<span>Trust</span></div>
                <div class="logo-subtitle">ETHICAL AI</div>
            </div>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#" class="active">Comparison</a>
            <a href="#">Upload</a>
            <a href="#">Docs</a>
        </div>
    </nav>

    <main class="comparison-page">
        <h1 class="page-title">Model Comparison & History</h1>

        <!-- Comparison section -->
        <section class="section-card">
            <div class="section-title"><i class="fas fa-code-branch"></i> Version Comparison</div>
            <div class="version-selector">
                <div class="select-group">
                    <label>Evaluation A</label>
                    <select class="version-select" id="selectA"></select>
                </div>
                <div class="vs-badge">VS</div>
                <div class="select-group">
                    <label>Evaluation B</label>
                    <select class="version-select" id="selectB"></select>
                </div>
                <button class="compare-btn" onclick="runComparison()"><i class="fas fa-arrow-right"></i> Compare</button>
            </div>
            <div id="comparisonResult"></div>
        </section>

        <!-- History section -->
        <section class="section-card">
            <div class="section-title"><i class="fas fa-history"></i> Retraining History</div>
            <div id="historySection"></div>
        </section>

        <!-- Alerts section -->
        <section class="section-card">
            <div class="section-title"><i class="fas fa-exclamation-triangle"></i> Monitoring Alerts</div>
            <div id="alertsSection"></div>
        </section>

        <div class="export-options">
            <button class="btn btn-secondary" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF Summary</button>
            <button class="btn btn-secondary" onclick="exportCSV()"><i class="fas fa-file-csv"></i> CSV</button>
            <button class="btn btn-primary"   onclick="exportJSON()"><i class="fas fa-download"></i> JSON</button>
        </div>
    </main>

    <script>
        (function() {
            // ---------- HARDCODED SAMPLE DATA (same as before) ----------
            const DIMENSIONS = [
                "Individual Fairness", "Group Fairness", "Demographic Bias",
                "Calibration", "Disparate Impact", "Counterfactual", "Intersectional"
            ];

            const MOCK_EVALS = [
                { evaluation_id: "eval_001", ethical_score: 0.82, records: 12500, model_id: "bert-base-uncased", dimensions: [0.85, 0.78, 0.81, 0.79, 0.84, 0.77, 0.80] },
                { evaluation_id: "eval_002", ethical_score: 0.77, records: 14200, model_id: "roberta-large", dimensions: [0.72, 0.74, 0.80, 0.71, 0.69, 0.73, 0.68] },
                { evaluation_id: "eval_003", ethical_score: 0.91, records: 23100, model_id: "fairtrust-v2", dimensions: [0.93, 0.89, 0.90, 0.88, 0.92, 0.87, 0.91] },
                { evaluation_id: "eval_004", ethical_score: 0.69, records: 9800, model_id: "distilbert-base", dimensions: [0.65, 0.68, 0.63, 0.70, 0.61, 0.67, 0.64] },
                { evaluation_id: "eval_005", ethical_score: 0.88, records: 18700, model_id: "fairtrust-v3", dimensions: [0.89, 0.86, 0.88, 0.87, 0.90, 0.85, 0.86] }
            ];

            function dimsArrayToObj(arr) {
                const obj = {};
                DIMENSIONS.forEach((d, i) => obj[d] = arr[i] ?? 0);
                return obj;
            }

            const MOCK_EVALS_FULL = MOCK_EVALS.map(e => ({
                ...e,
                dimensions: dimsArrayToObj(e.dimensions)
            }));

            const MOCK_HISTORY = [
                { evaluation_id: "eval_001", ethical_score: 0.82, trigger: "initial training", records: 12500, model_id: "bert-base-uncased", improvement: null, improvement_pct: null },
                { evaluation_id: "eval_002", ethical_score: 0.77, trigger: "adversarial debiasing", records: 14200, model_id: "roberta-large", improvement: -0.05, improvement_pct: -6.1 },
                { evaluation_id: "eval_003", ethical_score: 0.91, trigger: "fairness-aware tuning", records: 23100, model_id: "fairtrust-v2", improvement: +0.14, improvement_pct: +18.2 },
                { evaluation_id: "eval_004", ethical_score: 0.69, trigger: "data augmentation", records: 9800, model_id: "distilbert-base", improvement: -0.22, improvement_pct: -24.2 },
                { evaluation_id: "eval_005", ethical_score: 0.88, trigger: "reweighted training", records: 18700, model_id: "fairtrust-v3", improvement: +0.19, improvement_pct: +27.5 }
            ];

            const MOCK_TREND = MOCK_HISTORY.map(h => h.ethical_score);
            const MOCK_ALERTS = [
                { severity: "critical", message: "Demographic bias exceeded threshold (0.80)", eval_id: "eval_002", resolved: false },
                { severity: "warning", message: "Disparate impact score dropped 12%", eval_id: "eval_004", resolved: false },
                { severity: "info", message: "Counterfactual fairness variance high", eval_id: "eval_001", resolved: true },
                { severity: "warning", message: "Calibration shift detected across groups", eval_id: "eval_003", resolved: false },
                { severity: "critical", message: "Intersectional fairness below 0.65", eval_id: "eval_004", resolved: false },
                { severity: "resolved", message: "Individual fairness recovered after retrain", eval_id: "eval_005", resolved: true }
            ];
            const MOCK_ALERT_SUMMARY = {
                critical: 2, warning: 2, resolved: 2, total: 6
            };

            // Helpers
            function scoreColor(score) {
                if (score >= 0.80) return 'var(--success)';
                if (score >= 0.65) return '#ED6C02'; // orange
                return 'var(--danger)';
            }
            function shortId(id) { return id ? id.slice(0, 8) + '…' : '—'; }

            function getMockComparison(idA, idB) {
                const a = MOCK_EVALS_FULL.find(e => e.evaluation_id === idA) || MOCK_EVALS_FULL[0];
                const b = MOCK_EVALS_FULL.find(e => e.evaluation_id === idB) || MOCK_EVALS_FULL[1];
                const delta = DIMENSIONS.map(dim => {
                    const scoreA = a.dimensions[dim];
                    const scoreB = b.dimensions[dim];
                    const diff = scoreB - scoreA;
                    let delta_class = 'neutral', delta_label = diff.toFixed(3);
                    if (diff > 0.02) { delta_class = 'improvement'; delta_label = '▲ +' + diff.toFixed(3); }
                    else if (diff < -0.02) { delta_class = 'regression'; delta_label = '▼ ' + diff.toFixed(3); }
                    else delta_label = '▬ ' + diff.toFixed(3);
                    return { dimension: dim, score_a: scoreA, score_b: scoreB, delta_class, delta_label };
                });
                const overallDiff = b.ethical_score - a.ethical_score;
                let verdict = {};
                if (overallDiff > 0.03) verdict = { icon: '✅', title: 'B shows significant improvement', detail: `Ethical score increased by ${(overallDiff*100).toFixed(1)}%`, badge: '↑ B BETTER' };
                else if (overallDiff < -0.03) verdict = { icon: '⚠️', title: 'A outperforms B', detail: `Ethical score dropped by ${(-overallDiff*100).toFixed(1)}%`, badge: '↓ A BETTER' };
                else verdict = { icon: '⚖️', title: 'Comparable fairness', detail: 'Scores are within ±0.03', badge: '→ TIE' };
                return { eval_a: a, eval_b: b, delta, verdict };
            }

            // Radar chart with navy/gold
            function drawRadarChart(canvasId, evalA, evalB, dimensions) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const size = 400;
                canvas.width = size; canvas.height = size;
                const centerX = size/2, centerY = size/2, radius = size * 0.35;
                const angleStep = (Math.PI*2) / dimensions.length;
                const angles = dimensions.map((_, i) => -Math.PI/2 + i*angleStep);

                ctx.clearRect(0,0,size,size);
                // background circles
                ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.8;
                for (let level=0.2; level<=1.0; level+=0.2) {
                    ctx.beginPath();
                    for (let i=0; i<=dimensions.length; i++) {
                        const a = angles[i%dimensions.length];
                        const x = centerX + radius*level*Math.cos(a);
                        const y = centerY + radius*level*Math.sin(a);
                        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    }
                    ctx.closePath(); ctx.stroke();
                }
                // axes
                angles.forEach(angle => {
                    const x = centerX + radius*Math.cos(angle);
                    const y = centerY + radius*Math.sin(angle);
                    ctx.beginPath(); ctx.moveTo(centerX,centerY); ctx.lineTo(x,y);
                    ctx.strokeStyle = '#aaa'; ctx.stroke();
                });
                // labels
                ctx.font = 'bold 10px "Inter", sans-serif'; ctx.fillStyle = 'var(--text)'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                angles.forEach((angle,i) => {
                    const x = centerX + (radius+22)*Math.cos(angle);
                    const y = centerY + (radius+22)*Math.sin(angle);
                    let label = dimensions[i].replace('Fairness','F.').replace('Bias','B.').replace('Impact','Imp.').replace('Counterfactual','C.F.').replace('Intersectional','Inter.');
                    ctx.fillText(label, x, y);
                });

                function getPoints(ev) {
                    return dimensions.map((dim,i) => {
                        const score = ev.dimensions[dim] || 0;
                        const r = radius * Math.min(score,1);
                        const angle = angles[i];
                        return { x: centerX + r*Math.cos(angle), y: centerY + r*Math.sin(angle), score };
                    });
                }
                const pointsA = getPoints(evalA);
                const pointsB = getPoints(evalB);

                // A (navy)
                ctx.beginPath();
                pointsA.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
                ctx.closePath(); ctx.fillStyle = 'rgba(26,45,78,0.15)'; ctx.fill(); ctx.strokeStyle = 'var(--primary)'; ctx.lineWidth=2.8; ctx.stroke();
                pointsA.forEach(p => { ctx.beginPath(); ctx.arc(p.x,p.y,5,0,2*Math.PI); ctx.fillStyle='var(--primary)'; ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke(); ctx.font='bold 9px Inter'; ctx.fillStyle='var(--primary)'; ctx.fillText(p.score.toFixed(2), p.x-12, p.y-12); });

                // B (gold)
                ctx.beginPath();
                pointsB.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
                ctx.closePath(); ctx.fillStyle = 'rgba(235,178,85,0.15)'; ctx.fill(); ctx.strokeStyle = 'var(--secondary)'; ctx.lineWidth=2.8; ctx.stroke();
                pointsB.forEach(p => { ctx.beginPath(); ctx.arc(p.x,p.y,5,0,2*Math.PI); ctx.fillStyle='var(--secondary)'; ctx.fill(); ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke(); ctx.font='bold 9px Inter'; ctx.fillStyle='var(--secondary)'; ctx.fillText(p.score.toFixed(2), p.x+8, p.y+16); });

                // scale markers
                ctx.font = '8px Inter'; ctx.fillStyle = 'var(--text-muted)';
                for (let level=0.2; level<1.0; level+=0.2) {
                    const x = centerX + radius*level*Math.cos(-Math.PI/2);
                    const y = centerY + radius*level*Math.sin(-Math.PI/2) - 6;
                    ctx.fillText(level.toFixed(1), x, y);
                }
            }

            // Render functions (identical logic, just using new style)
            function renderComparison(data) {
                const a = data.eval_a, b = data.eval_b, verdict = data.verdict;
                const modelCard = (ev, label) => {
                    const dimBars = DIMENSIONS.map(d => {
                        const v = ev.dimensions[d] ?? 0;
                        return `<div class="dim-row"><span class="dim-label">${d}</span><div class="dim-bar-track"><div class="dim-bar-fill" data-pct="${Math.round(v*100)}"></div></div><span class="dim-val" style="color:${scoreColor(v)}">${v.toFixed(2)}</span></div>`;
                    }).join('');
                    return `<div class="model-card"><div class="model-header"><span class="model-id">${shortId(ev.evaluation_id)}</span><span class="model-records">${ev.records?.toLocaleString() ?? '—'} records</span></div><div class="model-score"><div class="model-score-val" style="color:${scoreColor(ev.ethical_score)}">${ev.ethical_score?.toFixed(2) ?? '—'}</div><div class="model-score-label">Ethical Score (${label})</div></div><div class="dim-bars">${dimBars}</div></div>`;
                };
                const deltaRows = data.delta.map(r => `<tr><td>${r.dimension}</td><td>${r.score_a.toFixed(4)}</td><td>${r.score_b.toFixed(4)}</td><td class="${r.delta_class}">${r.delta_label}</td></tr>`).join('');
                const html = `<div class="comparison-grid">${modelCard(a,'A')}${modelCard(b,'B')}</div><table class="comparison-table"><thead><tr><th>Dimension</th><th>Eval A</th><th>Eval B</th><th>Δ</th></tr></thead><tbody>${deltaRows}</tbody></table><div class="verdict"><h3>${verdict.icon} ${verdict.title}</h3><p>${verdict.detail}</p><span class="verdict-badge">${verdict.badge}</span></div><div class="radar-container"><div class="radar-title">Fairness Radar · Seven Dimensions</div><div class="radar-wrapper"><canvas id="radarChartCanvas" class="radar-canvas"></canvas><div class="radar-legend"><div class="legend-item"><div class="legend-color A"></div><span><strong>${shortId(a.evaluation_id)}</strong> (A)</span></div><div class="legend-item"><div class="legend-color B"></div><span><strong>${shortId(b.evaluation_id)}</strong> (B)</span></div></div></div></div>`;
                document.getElementById('comparisonResult').innerHTML = html;
                requestAnimationFrame(() => { document.querySelectorAll('.dim-bar-fill[data-pct]').forEach(el => { el.style.width = el.dataset.pct + '%'; }); });
                setTimeout(() => { drawRadarChart('radarChartCanvas', a, b, DIMENSIONS); }, 60);
            }

            function renderHistory(history, trend) {
                if (!history.length) { document.getElementById('historySection').innerHTML = '<div class="empty-state"><h3>No history yet</h3><p>Complete multiple evaluations to see the retraining timeline.</p></div>'; return; }
                const maxScore = Math.max(...trend, 0.01);
                const sparkBars = trend.map(v => `<div class="trend-bar" style="height:${Math.round((v/maxScore)*100)}%" title="${v}"></div>`).join('');
                const sparkLabels = trend.map(v => `<div class="trend-label">${v.toFixed(2)}</div>`).join('');
                const items = history.map((h,i) => {
                    const impHtml = h.improvement != null ? `<span class="${h.improvement>=0?'improvement-badge':'regression-badge'}">${h.improvement>=0?'+':''}${h.improvement_pct}%</span> overall fairness` : `Baseline score: <strong>${h.ethical_score.toFixed(2)}</strong>`;
                    return `<div class="timeline-item" onclick="viewEval('${h.evaluation_id}')"><div class="timeline-left"><div class="timeline-index">Eval ${history.length-i}</div><div class="timeline-score" style="color:${scoreColor(h.ethical_score)}">${h.ethical_score.toFixed(2)}</div></div><div class="timeline-content"><div class="timeline-title">Evaluation ${shortId(h.evaluation_id)}</div><span class="timeline-trigger">${h.trigger}</span><div class="timeline-meta">Improvement: ${impHtml}<br>${h.records?.toLocaleString() ?? ''} records · Model: ${h.model_id?.slice(0,8)??''}</div></div></div>`;
                }).join('');
                document.getElementById('historySection').innerHTML = `<div class="trend-chart">${sparkBars}</div><div class="trend-labels">${sparkLabels}</div><div class="timeline" style="margin-top:1rem">${items}</div>`;
            }

            function renderAlerts(alerts, summary) {
                const chips = `<div class="alerts-summary">${summary.critical?`<span class="alert-chip critical">🔴 ${summary.critical} Critical</span>`:''}${summary.warning?`<span class="alert-chip warning">⚠️ ${summary.warning} Warning</span>`:''}${summary.resolved?`<span class="alert-chip resolved">✓ ${summary.resolved} Resolved</span>`:''}<span class="alert-chip neutral">Total: ${summary.total||0}</span></div>`;
                if (!alerts.length) { document.getElementById('alertsSection').innerHTML = chips + '<div class="empty-state"><h3>No alerts</h3><p>All evaluations are within acceptable thresholds.</p></div>'; return; }
                const items = alerts.map(a => {
                    const sev = a.severity.toLowerCase(); const cls = a.resolved ? 'resolved' : sev;
                    const icon = { critical:'🔴', warning:'⚠️', info:'ℹ️' }[sev] || '•';
                    return `<div class="alert-item ${cls}"><div><div class="alert-message">${icon} ${a.message}</div><div class="alert-meta">Eval: ${shortId(a.eval_id)}</div></div><span class="severity-badge ${cls}">${a.resolved?'Resolved':a.severity}</span></div>`;
                }).join('');
                document.getElementById('alertsSection').innerHTML = chips + items;
            }

            function populateSelectors() {
                const selectA = document.getElementById('selectA');
                const selectB = document.getElementById('selectB');
                const options = MOCK_EVALS_FULL.map(e => `<option value="${e.evaluation_id}">${shortId(e.evaluation_id)} — Score: ${e.ethical_score.toFixed(2)} (${e.records.toLocaleString()} records)</option>`).join('');
                selectA.innerHTML = options; selectB.innerHTML = options;
                if (MOCK_EVALS_FULL.length > 1) selectB.selectedIndex = 1;
            }

            window.runComparison = function() {
                const idA = document.getElementById('selectA').value, idB = document.getElementById('selectB').value;
                if (!idA || !idB || idA === idB) { document.getElementById('comparisonResult').innerHTML = '<div class="empty-state"><h3>Please select two different evaluations.</h3></div>'; return; }
                renderComparison(getMockComparison(idA, idB));
            };
            window.viewEval = function(evalId) { alert(`Navigate to dashboard for evaluation ${evalId} (demo)`); };
            window.exportPDF = function() { alert('Exporting comparison summary as PDF… (demo)'); };
            window.exportCSV = function() { alert('Exporting historical metrics as CSV… (demo)'); };
            window.exportJSON = function() {
                const data = { message: 'Export from comparison page (demo)', evaluations: MOCK_EVALS_FULL };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = 'comparison_export.json'; a.click();
            };

            populateSelectors();
            renderComparison(getMockComparison(MOCK_EVALS_FULL[0].evaluation_id, MOCK_EVALS_FULL[1].evaluation_id));
            renderHistory(MOCK_HISTORY, MOCK_TREND);
            renderAlerts(MOCK_ALERTS, MOCK_ALERT_SUMMARY);
        })();
    </script>
</body>
</html>
