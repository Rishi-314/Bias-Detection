<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join FairTrust — Ethical AI Evaluation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1A2D4E;
            --secondary: #EBB255;
            --accent: #4A90E2;
            --white: #FFFFFF;
            --light-bg: #F8F9FA;
            --shadow: 0 15px 35px rgba(26, 45, 78, 0.1);
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .logo {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .logo span { color: var(--secondary); }

        h2 { color: var(--primary); margin-bottom: 10px; text-align: center; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--primary); font-weight: 600; font-size: 14px; }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover { background: #2a457a; transform: translateY(-2px); }

        /* Payment Section (Hidden by default) */
        #paymentSection { display: none; }
        .payment-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed var(--secondary);
            margin-bottom: 20px;
        }

        .switch-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .switch-link a { color: var(--accent); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo">FAIR<span>TRUST</span></div>
    
    <div id="registerSection">
        <h2>Create Account</h2>
        <p class="subtitle">Join the mission for ethical AI</p>
        
        <form id="signUpForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@organization.com" required>
            </div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="+1..." required>
                </div>
                <div style="flex: 1;">
                    <label>DOB</label>
                    <input type="date" required>
                </div>
            </div>
            <div class="form-group">
                <label>Organization</label>
                <input type="text" placeholder="Company Name" required>
            </div>
            
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Password</label>
                    <input type="password" id="pass" placeholder="••••••••" required>
                </div>
                <div style="flex: 1;">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPass" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-group">
                <label>Where did you hear about us?</label>
                <select>
                    <option>LinkedIn</option>
                    <option>University</option>
                    <option>Search Engine</option>
                    <option>Referral</option>
                </select>
            </div>
            <button type="button" class="btn" onclick="showPayment()">Continue to Payment</button>
        </form>
        
        <div class="switch-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <div id="paymentSection">
        <h2>Membership Payment</h2>
        <p class="subtitle">Secure your certification access</p>
        <div class="payment-box">
            <p><strong>Plan:</strong> Enterprise AI Evaluation</p>
            <p><strong>Total Due:</strong> $299.00</p>
        </div>
        <div class="form-group">
            <label>Card Number</label>
            <input type="text" placeholder="XXXX XXXX XXXX XXXX">
        </div>
        <button type="button" class="btn" style="background: var(--secondary); color: var(--primary);" onclick="finishSignUp()">Complete Registration</button>
        <button type="button" class="btn" style="background: transparent; color: #666;" onclick="location.reload()">Back</button>
    </div>
</div>

<script>
    function showPayment() {
        const pass = document.getElementById('pass').value;
        const confirm = document.getElementById('confirmPass').value;

        if (pass === "" || confirm === "") {
            alert("Please fill in all password fields.");
            return;
        }

        if (pass !== confirm) {
            alert("Passwords do not match. Please try again.");
            return;
        }

        // If all good, proceed to payment
        document.getElementById('registerSection').style.display = 'none';
        document.getElementById('paymentSection').style.display = 'block';
    }
</script>

</body>
</html>
