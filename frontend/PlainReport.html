<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Bias Audit — Deep Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #0a0e27;
      --deep-blue: #1a2847;
      --gold: #d4a574;
      --red: #e74c3c;
      --amber: #f39c12;
      --green: #27ae60;
      --cyan: #1abc9c;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #0a0e27;
      --muted: #7f8c8d;
      --border: #ecf0f1;
      --mono: 'JetBrains Mono', monospace;
      --serif: 'Crimson Text', serif;
      --sans: 'Space Mono', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--serif);
      background: linear-gradient(135deg, var(--bg) 0%, #f0f3f7 100%);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255,255,255,0.98); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .logo { font-family: var(--sans); font-size: 1.25rem; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: .75rem; }
    .logo i { color: var(--gold); font-size: 1.5rem; }
    .search-bar { flex: 1; max-width: 400px; margin: 0 2rem; position: relative; }
    .search-bar input { width: 100%; padding: .7rem 1rem .7rem 2.5rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--serif); font-size: .9rem; transition: all .2s; }
    .search-bar input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,165,116,.1); }
    .search-bar i { position: absolute; left: .8rem; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .nav-controls { display: flex; gap: 1rem; align-items: center; }
    .filter-btn { padding: .7rem 1.2rem; border: 1.5px solid var(--border); background: var(--surface); border-radius: 8px; cursor: pointer; font-family: var(--sans); font-size: .85rem; font-weight: 600; transition: all .2s; color: var(--text); }
    .filter-btn:hover { border-color: var(--gold); background: rgba(212,165,116,.05); }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed; left: 0; top: 60px; width: 280px; height: calc(100vh - 60px);
      background: var(--navy); padding: 2rem 0; overflow-y: auto; border-right: 1px solid var(--deep-blue);
    }
    .sidebar-section { margin-bottom: 2rem; padding: 0 1rem; }
    .sidebar-label { font-family: var(--mono); font-size: .7rem; text-transform: uppercase; letter-spacing: .15em; color: rgba(255,255,255,.4); margin-bottom: .75rem; font-weight: 700; }
    .sidebar-item { display: flex; align-items: center; gap: .75rem; padding: .7rem 1rem; color: rgba(255,255,255,.6); text-decoration: none; border-radius: 6px; cursor: pointer; transition: all .2s; font-size: .95rem; }
    .sidebar-item:hover { color: var(--gold); background: rgba(212,165,116,.1); }
    .sidebar-item.active { color: var(--gold); background: rgba(212,165,116,.15); border-left: 3px solid var(--gold); padding-left: calc(1rem - 3px); }
    .sidebar-item i { width: 18px; }

    /* ── MAIN ── */
    main { margin-left: 280px; padding: 2rem 3rem; max-width: 1400px; }

    /* ── LOADING/ERROR ── */
    .loading-state { min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 3rem; }
    .loading-state .spin { font-size: 2.5rem; color: var(--gold); margin-bottom: 1rem; animation: spin .8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--deep-blue) 100%);
      color: white; padding: 3rem; border-radius: 16px; margin-bottom: 3rem;
      position: relative; overflow: hidden;
    }
    .hero::before { content: ''; position: absolute; top: -50%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(212,165,116,.15) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
    .hero-content { position: relative; z-index: 2; }
    .hero h1 { font-family: var(--serif); font-size: 2.5rem; margin-bottom: 1rem; line-height: 1.2; }
    .hero p { font-size: 1.1rem; opacity: .85; max-width: 600px; margin-bottom: 2rem; }
    .hero-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .stat { background: rgba(255,255,255,.1); padding: 1.5rem; border-radius: 10px; backdrop-filter: blur(10px); }
    .stat-val { font-family: var(--sans); font-size: 2rem; font-weight: 700; }
    .stat-val.green { color: var(--green); }
    .stat-val.red { color: #ff6b6b; }
    .stat-val.amber { color: var(--amber); }
    .stat-val.gold { color: var(--gold); }
    .stat-lbl { font-family: var(--mono); font-size: .75rem; text-transform: uppercase; color: rgba(255,255,255,.6); margin-top: .5rem; }

    /* ── SECTION ── */
    section { margin-bottom: 3rem; scroll-margin-top: 80px; }
    .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
    .section-icon { width: 50px; height: 50px; background: linear-gradient(135deg, var(--gold), var(--amber)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; }
    .section-header h2 { font-family: var(--serif); font-size: 2rem; margin: 0; }
    .section-header .meta { margin-left: auto; font-size: .9rem; color: var(--muted); }

    /* ── CARD ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; transition: all .3s; }
    .card:hover { border-color: var(--gold); box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1.5rem; }
    .card h3 { font-family: var(--serif); font-size: 1.4rem; margin: 0; }
    .badge { display: inline-flex; align-items: center; gap: .4rem; padding: .4rem .9rem; border-radius: 6px; font-family: var(--mono); font-size: .75rem; font-weight: 600; text-transform: uppercase; }
    .badge.critical { background: rgba(231,76,60,.15); color: var(--red); }
    .badge.warning  { background: rgba(243,156,18,.15); color: var(--amber); }
    .badge.info     { background: rgba(26,188,156,.15); color: var(--cyan); }
    .badge.pass     { background: rgba(39,174,96,.15);  color: var(--green); }

    /* ── ALERT BOX ── */
    .alert-box { border-left: 4px solid; padding: 1rem 1.25rem; border-radius: 0 8px 8px 0; margin-bottom: 1rem; }
    .alert-box.blocked { background: rgba(231,76,60,.08); border-color: var(--red); }
    .alert-box.blocked strong { color: var(--red); }
    .alert-box.info   { background: rgba(26,188,156,.08); border-color: var(--cyan); }
    .alert-box ul { margin: .75rem 0 0 1.5rem; color: var(--muted); font-size: .95rem; }

    /* ── ROOT CAUSES ── */
    .root-cause-tree { margin-top: 1.5rem; padding: 1.5rem; background: var(--bg); border-left: 4px solid var(--gold); border-radius: 8px; }
    .root-cause-item { margin-bottom: 1.5rem; padding-left: 1.5rem; position: relative; }
    .root-cause-item::before { content: '▸'; position: absolute; left: 0; color: var(--gold); font-size: 1.2rem; }
    .root-cause-title { font-family: var(--sans); font-weight: 700; color: var(--text); margin-bottom: .5rem; }
    .root-cause-detail { color: var(--muted); font-size: .95rem; line-height: 1.6; }
    .evidence-box { background: rgba(231,76,60,.08); border: 1px solid rgba(231,76,60,.2); padding: 1rem; border-radius: 8px; margin-top: .75rem; font-size: .9rem; }
    code.inline { background: rgba(0,0,0,.1); padding: 2px 6px; border-radius: 3px; font-family: var(--mono); font-size: .85em; }

    /* ── SHAP ── */
    .shap-feature-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; padding: 1rem; background: var(--bg); border-radius: 8px; }
    .shap-feature-name { font-family: var(--mono); font-weight: 600; min-width: 200px; font-size: .85rem; }
    .shap-feature-name.danger { color: var(--red); font-weight: 700; }
    .shap-bar-track { flex: 1; height: 24px; background: white; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .shap-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--amber)); display: flex; align-items: center; padding-left: .5rem; color: white; font-family: var(--mono); font-size: .7rem; font-weight: 700; transition: width .6s ease; min-width: 4px; }
    .shap-bar-fill.danger { background: linear-gradient(90deg, var(--red), var(--amber)); }
    .shap-feature-value { font-family: var(--mono); min-width: 80px; text-align: right; font-weight: 600; }
    .shap-warning { background: rgba(231,76,60,.1); border-left: 4px solid var(--red); padding: 1rem; border-radius: 8px; margin: 1.5rem 0; }
    .shap-warning strong { color: var(--red); display: block; margin-bottom: .5rem; }

    /* ── BIAS TYPES ── */
    .expandable { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
    .expandable-header { padding: 1.2rem; background: var(--bg); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all .2s; font-weight: 600; }
    .expandable-header:hover { background: rgba(212,165,116,.1); }
    .expandable-header.open { background: rgba(212,165,116,.15); }
    .expandable-toggle { font-size: 1rem; transition: transform .3s; color: var(--gold); }
    .expandable-toggle.open { transform: rotate(180deg); }
    .expandable-content { display: none; padding: 1.5rem; background: var(--surface); border-top: 1px solid var(--border); animation: slideDown .3s ease; }
    .expandable-content.open { display: block; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── COUNTERFACTUAL ── */
    .cf-pair { padding: 1.5rem; background: var(--bg); border-radius: 10px; border-left: 4px solid var(--red); margin-bottom: 1.5rem; }
    .cf-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 2rem; align-items: start; margin-bottom: 1.25rem; }
    .cf-person { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .cf-person-head { font-family: var(--mono); font-size: .75rem; font-weight: 700; text-transform: uppercase; margin-bottom: .4rem; }
    .cf-person-head.approved { color: var(--green); }
    .cf-person-head.rejected { color: var(--red); }
    .cf-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px dashed var(--border); font-size: .8rem; }
    .cf-row:last-child { border: none; }
    .cf-k { color: var(--muted); }
    .cf-v { font-family: var(--mono); font-weight: 600; }
    .cf-v.diff { color: var(--red); }
    .cf-divider { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding-top: 1.5rem; color: var(--red); font-family: var(--mono); font-size: .75rem; text-transform: uppercase; }
    .cf-explain { padding: 1rem; background: white; border-radius: 8px; border-left: 4px solid var(--red); font-size: .9rem; }
    .cf-explain strong { color: var(--red); display: block; margin-bottom: .4rem; }

    /* ── FIX INSTRUCTIONS ── */
    .code-block { margin: 1.5rem 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .code-header { background: var(--navy); color: white; padding: .8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: .85rem; }
    .code-header .lang { font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--gold); }
    .code-copy { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: white; padding: .4rem .8rem; border-radius: 4px; cursor: pointer; font-family: var(--mono); font-size: .75rem; transition: all .2s; }
    .code-copy:hover { background: rgba(255,255,255,.15); }
    .code-content { background: var(--navy); color: #a8e6cf; padding: 1.2rem; overflow-x: auto; font-family: var(--mono); font-size: .8rem; line-height: 1.6; }
    .code-content code { display: block; white-space: pre; }

    /* ── CHECKLIST ── */
    .checklist { display: flex; flex-direction: column; gap: 1rem; }
    .checklist-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem; background: var(--bg); border-radius: 8px; border-left: 4px solid var(--border); }
    .checklist-item.critical { border-left-color: var(--red); background: rgba(231,76,60,.05); }
    .checklist-item.warning  { border-left-color: var(--amber); background: rgba(243,156,18,.05); }
    .checklist-item.done     { border-left-color: var(--green); background: rgba(39,174,96,.05); }
    .checklist-checkbox { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; margin-top: 2px; }
    .checklist-item.done .checklist-checkbox { background: var(--green); border-color: var(--green); color: white; }
    .checklist-text strong { display: block; margin-bottom: .3rem; }
    .checklist-text small { color: var(--muted); display: block; }

    /* ── AI ANALYSIS BLOCK ── */
    .ai-analysis { background: linear-gradient(135deg, var(--navy) 0%, var(--deep-blue) 100%); color: white; padding: 2rem; border-radius: 12px; margin-top: 2rem; }
    .ai-analysis h4 { color: var(--gold); margin-bottom: 1rem; font-family: var(--mono); font-size: .85rem; text-transform: uppercase; letter-spacing: .1em; }
    .ai-content { font-family: var(--serif); line-height: 1.8; color: rgba(255,255,255,.9); }
    .ai-content p { margin-bottom: 1rem; }
    .ai-loading { display: flex; align-items: center; gap: 1rem; color: var(--gold); }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(212,165,116,.3); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }

    /* ── GEMINI ── */
    .gemini-key-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .gemini-key-row input { flex: 1; padding: .8rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: .85rem; }
    .gemini-btn { padding: .8rem 1.5rem; background: linear-gradient(135deg, var(--gold), var(--amber)); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: var(--serif); transition: all .2s; }
    .gemini-btn:hover { opacity: .9; transform: translateY(-1px); }
    .gemini-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    #gemini-output { display: none; padding: 1.5rem; background: var(--navy); color: white; border-radius: 10px; font-family: var(--serif); line-height: 1.8; margin-top: 1rem; white-space: pre-wrap; }

    /* ── FILTER DROPDOWN ── */
    .filter-dropdown { position: absolute; top: 100%; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-top: .5rem; min-width: 200px; display: none; box-shadow: 0 8px 24px rgba(0,0,0,.1); z-index: 100; }
    .filter-dropdown.open { display: block; }
    .filter-option { padding: .5rem .75rem; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: .5rem; font-size: .9rem; }
    .filter-option:hover { background: var(--bg); }

    /* ── TIMELINE ── */
    .timeline-list { padding: 1.5rem 0; }
    .timeline-item { display: flex; gap: 1rem; padding: .75rem 0; font-size: .9rem; border-bottom: 1px dashed var(--border); }
    .timeline-item:last-child { border: none; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .timeline-dot.crit { background: var(--red); }
    .timeline-dot.warn { background: var(--amber); }
    .timeline-dot.ok   { background: var(--green); }
    .timeline-content strong { display: block; color: var(--text); }
    .timeline-content span  { color: var(--muted); font-size: .85rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) { .sidebar { width: 240px; } main { margin-left: 240px; } }
    @media (max-width: 768px) {
      .sidebar { display: none; } main { margin-left: 0; padding: 1.5rem; }
      .hero h1 { font-size: 1.8rem; } .cf-grid { grid-template-columns: 1fr; } .cf-divider { display: none; }
      .hero-stats { grid-template-columns: 1fr; }
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo"><i class="fas fa-shield-alt"></i><span>FairTrust Audit</span></div>
  <div class="search-bar">
    <i class="fas fa-search"></i>
    <input type="text" id="search" placeholder="Search sections, root causes, fixes...">
  </div>
  <div class="nav-controls">
    <div style="position:relative">
      <button class="filter-btn" onclick="toggleFilterDropdown()"><i class="fas fa-filter"></i> Filter</button>
      <div class="filter-dropdown" id="filterDropdown">
        <label class="filter-option"><input type="checkbox" class="issue-filter" value="critical" onchange="applyFilters()"> Critical Only</label>
        <label class="filter-option"><input type="checkbox" class="issue-filter" value="warning"  onchange="applyFilters()"> Warnings</label>
        <label class="filter-option"><input type="checkbox" class="issue-filter" value="code"     onchange="applyFilters()"> With Code</label>
      </div>
    </div>
    <button class="filter-btn" onclick="window.print()"><i class="fas fa-download"></i> Export</button>
  </div>
</nav>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Overview</div>
    <a class="sidebar-item active" href="#overview"    onclick="scrollToSection('overview')">   <i class="fas fa-chart-pie"></i> Overview</a>
    <a class="sidebar-item"        href="#root-causes" onclick="scrollToSection('root-causes')"><i class="fas fa-sitemap"></i> Root Causes</a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Technical Analysis</div>
    <a class="sidebar-item" href="#shap"          onclick="scrollToSection('shap')">         <i class="fas fa-chart-bar"></i> SHAP Explanation</a>
    <a class="sidebar-item" href="#counterfactual" onclick="scrollToSection('counterfactual')"><i class="fas fa-not-equal"></i> Counterfactual Evidence</a>
    <a class="sidebar-item" href="#bias-types"    onclick="scrollToSection('bias-types')">   <i class="fas fa-exclamation-triangle"></i> Bias Types</a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Implementation</div>
    <a class="sidebar-item" href="#fixes"      onclick="scrollToSection('fixes')">     <i class="fas fa-wrench"></i> Fix Instructions</a>
    <a class="sidebar-item" href="#deployment" onclick="scrollToSection('deployment')"><i class="fas fa-rocket"></i> Deployment Checklist</a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">AI Analysis</div>
    <a class="sidebar-item" href="#gemini" onclick="scrollToSection('gemini')"><i class="fas fa-brain"></i> Gemini Deep Dive</a>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main id="app">
  <div class="loading-state">
    <span class="spin"><i class="fas fa-circle-notch"></i></span>
    <div style="font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:.5rem;font-family:var(--sans)">Loading audit data…</div>
    <div style="color:var(--muted)">Fetching evaluation results from FairTrust API</div>
  </div>
</main>

<script>
const API = 'http://127.0.0.1:5000';
const fmt = (v, d=4) => v != null ? Number(v).toFixed(d) : '—';
const pct = (v, d=1) => v != null ? (Number(v)*100).toFixed(d) + '%' : '—';

/* ── SEARCH ── */
document.getElementById('search').addEventListener('keyup', e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('section').forEach(s => {
    s.style.display = !q || s.innerText.toLowerCase().includes(q) ? 'block' : 'none';
  });
});

function toggleFilterDropdown() { document.getElementById('filterDropdown').classList.toggle('open'); }
function applyFilters() {}

function scrollToSection(id) {
  document.querySelectorAll('.sidebar-item').forEach(a => a.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
  const link = document.querySelector(`.sidebar-item[href="#${id}"]`);
  if (link) link.classList.add('active');
}

window.addEventListener('scroll', () => {
  document.querySelectorAll('section[id]').forEach(s => {
    const r = s.getBoundingClientRect();
    if (r.top < 200 && r.bottom > 200) {
      document.querySelectorAll('.sidebar-item').forEach(a => a.classList.remove('active'));
      const l = document.querySelector(`.sidebar-item[href="#${s.id}"]`);
      if (l) l.classList.add('active');
    }
  });
});

function toggleExpandable(header) {
  const content = header.nextElementSibling;
  content.classList.toggle('open');
  header.classList.toggle('open');
  const t = header.querySelector('.expandable-toggle');
  if (t) t.classList.toggle('open');
}

function toggleCheckbox(el) {
  el.classList.toggle('checked');
  el.innerHTML = el.classList.contains('checked') ? '✓' : '';
  el.closest('.checklist-item').classList.toggle('done');
}

function copyCode(btn, codeId) {
  const el = document.getElementById(codeId);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);

/* ── SENSITIVE KEYWORD DETECTION ── */
const SENS_KW = ['gender','sex','race','caste','age','religion','ethnicity','nationality','caste_proxy','surname','candidate_id','hometown'];
function isSensitive(name) { return SENS_KW.some(k => name.toLowerCase().includes(k)); }

/* ── SEVERITY HELPERS ── */
function sev(s) { return s >= .80 ? 'pass' : s >= .60 ? 'warn' : 'crit'; }
function sevLabel(s) { return { pass: 'PASS', warn: 'MARGINAL', crit: 'CRITICAL' }[sev(s)]; }
function sevColor(s) { return { pass: 'var(--green)', warn: 'var(--amber)', crit: 'var(--red)' }[sev(s)]; }

/* ── BUILD SHAP BARS ── */
function buildShapBars(shap) {
  if (!shap || !shap.feature_importance) return '<p style="color:var(--muted)">No SHAP data available.</p>';
  let fi = shap.feature_importance;
  if (!Array.isArray(fi)) fi = Object.entries(fi).sort((a,b)=>b[1]-a[1]).map(([feature,shap_value])=>({feature,shap_value}));
  const top = fi.slice(0,10);
  const maxVal = top[0]?.shap_value || 1;
  return top.map(f => {
    const w = Math.max(2, (f.shap_value / maxVal) * 100);
    const sens = isSensitive(f.feature);
    const lbl = w > 20 ? fmt(f.shap_value, 4) : '';
    return `<div class="shap-feature-bar">
      <div class="shap-feature-name${sens?' danger':''}">
        ${sens?'⚠ ':''}${f.feature}
      </div>
      <div class="shap-bar-track">
        <div class="shap-bar-fill${sens?' danger':''}" style="width:${w}%">${lbl}</div>
      </div>
      <div class="shap-feature-value" style="color:${sens?'var(--red)':'var(--text)'}">
        ${fmt(f.shap_value, 4)}
      </div>
    </div>`;
  }).join('');
}

/* ── BUILD COUNTERFACTUAL PAIRS ── */
function buildCFPairs(cfExamples) {
  if (!cfExamples || cfExamples.length === 0) {
    return `<div style="text-align:center;padding:2rem;color:var(--muted)">
      <i class="fas fa-check-circle" style="color:var(--green);font-size:2rem;display:block;margin-bottom:.75rem"></i>
      No counterfactual pairs found — model appears counterfactually fair.
    </div>`;
  }
  return cfExamples.map((cf, idx) => {
    const pA = cf.person_a || {};
    const pB = cf.person_b || {};
    const attr = cf.attribute || 'attribute';
    const oA = (pA.outcome || 'REJECTED').toLowerCase();
    const oB = (pB.outcome || 'REJECTED').toLowerCase();
    const profile = pA.profile || {};
    const profileKeys = Object.keys(profile).slice(0,4);

    function personRows(p) {
      let rows = profileKeys.map(k => `<div class="cf-row"><span class="cf-k">${k.replace(/_/g,' ')}</span><span class="cf-v">${typeof p.profile?.[k] === 'number' ? Number(p.profile[k]).toFixed(1) : (p.profile?.[k] ?? '—')}</span></div>`).join('');
      rows += `<div class="cf-row"><span class="cf-k">${attr}</span><span class="cf-v diff">${p.sensitive_val ?? '—'}</span></div>`;
      rows += `<div class="cf-row"><span class="cf-k">prediction</span><span class="cf-v">${p.prediction != null ? Math.round(p.prediction*100)+'%' : '—'}</span></div>`;
      return rows;
    }

    return `<div class="cf-pair">
      <div class="cf-grid">
        <div class="cf-person">
          <div class="cf-person-head ${oA}">Person A — ${oA.toUpperCase()}</div>
          ${personRows(pA)}
        </div>
        <div class="cf-divider"><i class="fas fa-not-equal"></i><span>Only<br>diff:<br>${attr}</span></div>
        <div class="cf-person">
          <div class="cf-person-head ${oB}">Person B — ${oB.toUpperCase()}</div>
          ${personRows(pB)}
        </div>
      </div>
      <div class="cf-explain">
        <strong>What this proves:</strong>
        ${cf.plain_english || `When <strong>${attr}</strong> changes (all else identical), the model gives opposite decisions. This is direct evidence of discrimination.`}
      </div>
    </div>`;
  }).join('');
}

/* ── BUILD FIX CARDS ── */
function buildFixCards(fixes) {
  if (!fixes || fixes.length === 0) return '<p style="color:var(--muted)">No fixes identified.</p>';

  const CODES = {
    privacy_score: `import hashlib\n# Drop direct identifiers\ndf.drop(columns=['name','email','candidate_id','surname'], inplace=True)\n# Hash quasi-identifiers instead of removing\ndf['surname_hash'] = df['surname'].apply(\n    lambda x: hashlib.sha256(str(x).encode()).hexdigest()[:8]\n) if 'surname' in df.columns else None`,
    disparateImpact: `from fairlearn.postprocessing import ThresholdOptimizer\nmitigator = ThresholdOptimizer(\n    estimator=model,\n    constraints='demographic_parity',\n    objective='balanced_accuracy_score'\n)\nmitigator.fit(X_train, y_train, sensitive_features=sensitive_col)`,
    counterfactual: `# Step 1: Find proxy features\nfor col in X.columns:\n    corr = X[col].corr(df[sensitive_attr])\n    if abs(corr) > 0.3:\n        print(f"Proxy: {col} — r={corr:.3f}")\n\n# Step 2: Drop proxies\nX_clean = X.drop(columns=proxy_columns)`,
    demographicParity: `from fairlearn.reductions import ExponentiatedGradient, DemographicParity\nmitigator = ExponentiatedGradient(\n    estimator=base_model,\n    constraints=DemographicParity()\n)\nmitigator.fit(X_train, y_train, sensitive_features=sensitive_col)`,
    robustness_score: `from sklearn.calibration import CalibratedClassifierCV\ncalibrated = CalibratedClassifierCV(\n    estimator=your_model, method='isotonic', cv='prefit'\n)\ncalibrated.fit(X_val, y_val)`,
  };

  return fixes.slice(0,6).map((fix, i) => {
    const priority = fix.severity || fix.priority || 'WARNING';
    const cls = priority === 'CRITICAL' ? 'critical' : priority === 'WARNING' ? 'warning' : '';
    const bp = Math.round((fix.current_score || 0) * 100);
    const ap = Math.round((fix.estimated_score_after || 0) * 100);
    const codeSnippet = fix.code || CODES[fix.dimension_key] || '';
    const codeId = `code-fix-${i}`;

    return `<div class="expandable">
      <div class="expandable-header" onclick="toggleExpandable(this)">
        <div>
          <span class="badge ${cls}" style="margin-right:.75rem">[${priority}] Step ${i+1}</span>
          <strong>${fix.title || '—'}</strong>
          <div style="font-size:.85rem;color:var(--muted);margin-top:.3rem">
            ${fix.effort ? `Effort: ${fix.effort}` : ''}
            ${bp && ap ? ` | Impact: ${bp}% → ~${ap}%` : ''}
          </div>
        </div>
        <div class="expandable-toggle"><i class="fas fa-chevron-down"></i></div>
      </div>
      <div class="expandable-content">
        <p><strong>Why this matters:</strong> ${fix.description || 'This fix addresses a key fairness issue in the model.'}</p>
        ${codeSnippet ? `<div class="code-block">
          <div class="code-header">
            <span class="lang">Python</span>
            <button class="code-copy" onclick="copyCode(this,'${codeId}')">Copy</button>
          </div>
          <div class="code-content"><code id="${codeId}">${escHtml(codeSnippet)}</code></div>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── BUILD DEPLOYMENT CHECKLIST ── */
function buildChecklist(fixes, remediation) {
  const items = [];

  if (remediation?.deployment_blocked) {
    items.push({ cls:'critical', title:'[CRITICAL] Halt current production deployment', sub:'Notify stakeholders: model has fairness issues, must be remediated before redeployment.' });
  }

  fixes.filter(f => (f.severity||'') === 'CRITICAL').forEach(fix => {
    items.push({ cls:'critical', title:`[CRITICAL] ${fix.title}`, sub: fix.description?.split('.')[0] + '.' || '' });
  });

  fixes.filter(f => (f.severity||'') === 'WARNING').forEach(fix => {
    items.push({ cls:'warning', title:`[WARNING] ${fix.title}`, sub: fix.description?.split('.')[0] + '.' || '' });
  });

  items.push({ cls:'warning', title:'[WARNING] Re-evaluate all fairness metrics', sub:'Run full 7-dimension audit. All dimensions must meet threshold requirements.' });
  items.push({ cls:'warning', title:'[WARNING] Legal review & sign-off', sub:'Send to compliance & legal. Document that bias has been addressed. Get written approval.' });
  items.push({ cls:'', title:'Set up weekly fairness monitoring', sub:'Implement automated checks. Alert if approval gaps exceed threshold.' });
  items.push({ cls:'', title:'Update feature engineering guidelines', sub:'Prohibit PII in features. Require fairness audit before any model deployment.' });
  items.push({ cls:'', title:'Redeploy cleaned, fair model to production', sub:'Only after all critical items are complete and legal approves.' });

  return items.map(item => `<div class="checklist-item ${item.cls}">
    <div class="checklist-checkbox" onclick="toggleCheckbox(this)"></div>
    <div class="checklist-text">
      <strong>${item.title}</strong>
      <small>${item.sub}</small>
    </div>
  </div>`).join('');
}

/* ── ROOT CAUSES (dynamic from data) ── */
function buildRootCauses(ev) {
  const fairness = ev.fairness || {};
  const privacy = ev.privacy || {};
  const shap = ev.shap || {};
  const piiCols = privacy.pii_columns || [];
  const quasiCols = privacy.quasi_identifiers || [];
  const fi = Array.isArray(shap.feature_importance) ? shap.feature_importance : Object.entries(shap.feature_importance||{}).map(([f,v])=>({feature:f,shap_value:v}));
  const sensitiveInShap = fi.filter(f => isSensitive(f.feature));

  const causes = [];

  if (piiCols.length > 0) {
    causes.push({
      title: '1. PII Data Leakage into Model',
      detail: `${piiCols.length} personal identifier column(s) were included in training features.`,
      evidence: piiCols.map(c => `<code class="inline">${c}</code>`).join(', ') + ' — personal identifiers that may allow the model to memorise individual patterns and reconstruct protected attributes.',
      consequence: 'Even if gender/caste columns are removed, the model can reconstruct them from these auxiliary features.'
    });
  }

  const proxyCols = fi.filter(f => isSensitive(f.feature) && !['gender','sex','is_male'].includes(f.feature.toLowerCase()));
  if (proxyCols.length > 0) {
    causes.push({
      title: '2. Protected Attribute Proxy Features',
      detail: 'Legitimate-looking features correlate with protected attributes:',
      evidence: proxyCols.slice(0,4).map(f => `<code class="inline">${f.feature}</code> (SHAP: ${fmt(f.shap_value,4)})`).join(', ') + ' — these features appear legitimate but encode protected attributes.',
      consequence: 'SHAP analysis shows these features predict outcomes by encoding protected attributes rather than job-relevant skills.'
    });
  }

  const dp = fairness.demographicParity || 0;
  if (dp > 0.05) {
    causes.push({
      title: '3. Historical Label Bias in Training Data',
      detail: 'The ground-truth labels reflect past discriminatory patterns:',
      evidence: `Demographic parity gap: <strong>${pct(dp)}</strong> (legal maximum: 4%). The model learns historical patterns as "correct" and reproduces them.`,
      consequence: 'Even with perfect fairness reweighting, the training data\'s label distribution perpetuates historical bias forward.'
    });
  }

  const hasFairnessTests = (ev.fairness_score || 0) < 0.80;
  if (hasFairnessTests) {
    causes.push({
      title: '4. No Fairness Testing in Development Pipeline',
      detail: 'Standard model evaluation (accuracy, F1, ROC-AUC) does not measure fairness:',
      evidence: `Model accuracy: <strong>${pct(ev.model_metrics?.accuracy)}</strong>, F1-score: <strong>${fmt(ev.model_metrics?.f1_score,2)}</strong> — both "excellent" by standard metrics. But the disparate impact ratio is <strong>${fmt(fairness.disparateImpact,2)}</strong> (should be ≥0.80).`,
      consequence: 'Model may have been deployed because conventional metrics looked good, without fairness validation.'
    });
  }

  if (causes.length === 0) {
    causes.push({
      title: '1. No Critical Root Causes Detected',
      detail: 'The model passed all automated bias checks.',
      evidence: 'Continue monitoring as new data is collected.',
      consequence: 'Set up weekly fairness monitoring to catch any drift early.'
    });
  }

  return causes.map(c => `<div class="root-cause-item">
    <div class="root-cause-title">${c.title}</div>
    <div class="root-cause-detail">
      ${c.detail}
      <div class="evidence-box">
        <strong style="display:block;margin-bottom:.5rem">Evidence:</strong>
        ${c.evidence}
      </div>
      <strong style="display:block;margin-top:1rem">Consequence:</strong> ${c.consequence}
    </div>
  </div>`).join('');
}

  <section id="bias-types">
    <div class="section-header">
      <div class="section-icon"><i class="fas fa-exclamation-triangle"></i></div>
      <h2>Three Types of Bias</h2>
      <div class="meta">Classification and explanation</div>
    </div>
    <div class="card">
      <div class="expandable">
        <div class="expandable-header" onclick="toggleExpandable(this)">
          <div><strong>Type 1: Direct Discrimination</strong><div style="font-size:.85rem;color:var(--muted);margin-top:.3rem">Protected attributes used directly as features</div></div>
          <div class="expandable-toggle"><i class="fas fa-chevron-down"></i></div>
        </div>
        <div class="expandable-content">
          <p><strong>What it is:</strong> The model explicitly uses protected attributes (gender, caste, race) as input features.</p>
          ${sensitiveInShap.filter(f => ['gender','sex','is_male','race','caste'].some(k=>f.feature.toLowerCase().includes(k))).length > 0
            ? `<p><strong>In your model:</strong></p><ul style="margin:.75rem 0 0 1.5rem">${sensitiveInShap.filter(f=>['gender','sex','is_male','race','caste'].some(k=>f.feature.toLowerCase().includes(k))).map(f=>`<li><code class="inline">${f.feature}</code> — SHAP value ${fmt(f.shap_value,4)}</li>`).join('')}</ul>`
            : '<p style="color:var(--green)">✓ No direct protected attribute columns found in top features.</p>'}
          <p style="margin-top:.75rem"><strong>Legal exposure:</strong> Direct disparate treatment under EEOC Title VII and Indian SC/ST Act. Criminal liability possible in India.</p>
          <p><strong>Fix:</strong> Remove the column immediately. Do not pass it to the model at all.</p>
        </div>
      </div>
      <div class="expandable" style="margin-top:1rem">
        <div class="expandable-header" onclick="toggleExpandable(this)">
          <div><strong>Type 2: Proxy Discrimination (Redlining)</strong><div style="font-size:.85rem;color:var(--muted);margin-top:.3rem">Legitimate features that correlate with protected attributes</div></div>
          <div class="expandable-toggle"><i class="fas fa-chevron-down"></i></div>
        </div>
        <div class="expandable-content">
          <p><strong>What it is:</strong> Features not explicitly protected, but correlated with them. The model learns to discriminate indirectly.</p>
          <p><strong>In your model:</strong> Features like <code class="inline">age</code>, <code class="inline">certifications_count</code>, or location-based features may correlate with protected attributes like gender or caste, creating indirect bias.</p>
          <p style="margin-top:.75rem"><strong>Legal exposure:</strong> Disparate impact under EEOC four-fifths rule. In India: constitutional bias under Articles 15-17.</p>
          <p><strong>Fix:</strong> Audit feature-attribute correlations. Drop features with |r| > 0.3 to sensitive attributes.</p>
        </div>
      </div>
      <div class="expandable" style="margin-top:1rem">
        <div class="expandable-header" onclick="toggleExpandable(this)">
          <div><strong>Type 3: Statistical Discrimination</strong><div style="font-size:.85rem;color:var(--muted);margin-top:.3rem">Group-level patterns in historical data generalise incorrectly</div></div>
          <div class="expandable-toggle"><i class="fas fa-chevron-down"></i></div>
        </div>
        <div class="expandable-content">
          <p><strong>What it is:</strong> The model learns that one group has a higher historical outcome rate and applies that group average to all individuals in that group, regardless of their individual merits.</p>
          <p><strong>In your model:</strong> Demographic parity gap of <strong>${pct(f.demographicParity)}</strong> suggests historical bias in training labels may be propagating forward.</p>
          <p style="margin-top:.75rem"><strong>Fix:</strong> Retrain with equalised odds or demographic parity constraint using <code class="inline">fairlearn.ExponentiatedGradient</code>.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- COUNTERFACTUAL EVIDENCE -->
  <section id="counterfactual">
    <div class="section-header">
      <div class="section-icon"><i class="fas fa-not-equal"></i></div>
      <h2>Counterfactual Bias Evidence</h2>
      <div class="meta">Real pairs showing discrimination</div>
    </div>
    <div class="card">
      <p style="margin-bottom:1.5rem">These are real pairs of candidates from your dataset with nearly identical profiles. Only one attribute differs. The model gave opposite decisions.</p>
      ${buildCFPairs(cfExamples)}
      <div class="ai-analysis" style="margin-top:2rem">
        <h4><i class="fas fa-brain"></i> Legal &amp; Reputational Analysis</h4>
        <div class="ai-content" id="ai-counterfactual">
          <div class="ai-loading"><div class="spinner"></div><span>Analysing legal &amp; reputational implications...</span></div>
        </div>
      </div>
    </div>
  </section>

  <!-- FIX INSTRUCTIONS -->
  <section id="fixes">
    <div class="section-header">
      <div class="section-icon"><i class="fas fa-wrench"></i></div>
      <h2>Fix Instructions</h2>
      <div class="meta">Copy-paste code to resolve each issue</div>
    </div>
    <div class="card">${buildFixCards(fixes)}</div>
  </section>

  <!-- DEPLOYMENT CHECKLIST -->
  <section id="deployment">
    <div class="section-header">
      <div class="section-icon"><i class="fas fa-rocket"></i></div>
      <h2>Deployment Checklist</h2>
      <div class="meta">Do not ship until all items are complete</div>
    </div>
    <div class="card">
      <div class="checklist">${buildChecklist(fixes, remediation)}</div>
      <div style="margin-top:2rem;padding:1.5rem;background:var(--bg);border-radius:10px">
        <strong style="color:var(--text);display:block;margin-bottom:.75rem">Estimated Timeline</strong>
        <div class="timeline-list">
          <div class="timeline-item"><div class="timeline-dot crit"></div><div class="timeline-content"><strong>Day 1–2</strong><span>PII removal &amp; data cleaning (2–3 hrs) + legal notification (1 hr)</span></div></div>
          <div class="timeline-item"><div class="timeline-dot crit"></div><div class="timeline-content"><strong>Day 2–3</strong><span>Protected attr removal &amp; model retraining (4–6 hrs)</span></div></div>
          <div class="timeline-item"><div class="timeline-dot warn"></div><div class="timeline-content"><strong>Day 3–4</strong><span>Fairness re-evaluation (2–3 hrs) + monitoring setup (3–4 hrs)</span></div></div>
          <div class="timeline-item"><div class="timeline-dot warn"></div><div class="timeline-content"><strong>Day 4–5</strong><span>Legal review &amp; sign-off (async, may take 1–2 days)</span></div></div>
          <div class="timeline-item"><div class="timeline-dot ok"></div><div class="timeline-content"><strong>Day 5+</strong><span>Redeployment once all checks pass</span></div></div>
        </div>
      </div>
    </div>
  </section>

  <!-- GEMINI DEEP DIVE -->
  <section id="gemini">
    <div class="section-header">
      <div class="section-icon"><i class="fas fa-brain"></i></div>
      <h2>Gemini AI Deep Dive</h2>
      <div class="meta">LLM-powered technical analysis</div>
    </div>
    <div class="card">
      <p style="margin-bottom:1.5rem">Powered by Gemini 2.5 Flash, this analysis provides:</p>
      <ul style="margin:0 0 1.5rem 1.5rem">
        <li>Legal liability assessment &amp; regulatory exposure</li>
        <li>Risk ranking by severity (legal, reputational, operational)</li>
        <li>Root cause synthesis across all evidence</li>
        <li>Production monitoring strategies</li>
        <li>Technical debt &amp; future prevention measures</li>
      </ul>
      <div class="gemini-key-row">
        <input type="password" id="gemini-key" placeholder="Paste your Gemini API key (AIza...)">
        <button class="gemini-btn" id="gemini-btn" onclick="runGeminiAnalysis(window._ev, window._fixes, window._cf)">
          <i class="fas fa-wand-magic-sparkles"></i> Analyze with Gemini
        </button>
      </div>
      <small style="color:var(--muted)">Get a free API key: <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--cyan)">aistudio.google.com</a></small>
      <div id="gemini-output"></div>
    </div>
  </section>`;

  // Store for Gemini
  window._ev = ev; window._fixes = fixes; window._cf = cfExamples;

  // Restore saved key
  const saved = localStorage.getItem('gemini_api_key');
  if (saved) { const k = document.getElementById('gemini-key'); if (k) k.value = saved; }

  // Populate inline AI sections
  setTimeout(() => populateInlineAI(ev, fi, sensitiveInShap, cfExamples, f), 300);

  // Intersection observer for sidebar
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = '#' + e.target.id;
        document.querySelectorAll('.sidebar-item').forEach(a => a.classList.remove('active'));
        const a = document.querySelector(`.sidebar-item[href="${id}"]`);
        if (a) a.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  ['overview', 'overview-detail', 'root-causes', 'shap', 'bias-types', 'counterfactual', 'fixes', 'deployment', 'gemini'].forEach(id => {
    const el = document.getElementById(id); if (el) obs.observe(el);
  });
}

function populateInlineAI(ev, fi, sensitiveInShap, cfExamples, f) {
  // Root causes AI block
  const aiRC = document.getElementById('ai-root-causes');
  if (aiRC) {
    const piiList = (ev.privacy?.pii_columns||[]).slice(0,3).map(c=>`<code style="background:rgba(0,0,0,.1);padding:2px 5px;border-radius:3px;font-family:var(--mono)">${c}</code>`).join(', ');
    const proxies = sensitiveInShap.filter(f=>!['gender','sex','is_male'].includes(f.feature.toLowerCase())).slice(0,3).map(f=>`<code style="background:rgba(0,0,0,.1);padding:2px 5px;border-radius:3px;font-family:var(--mono)">${f.feature}</code>`).join(', ');

    aiRC.innerHTML = `<p><strong style="color:var(--gold)">Root Cause Synthesis:</strong></p>
      ${piiList ? `<p>PII leakage (direct): Columns ${piiList} encode personal information directly. Even if protected attribute columns are removed, the model may reconstruct them from these proxies.</p>` : ''}
      ${proxies ? `<p>Proxy correlations (systematic): Features like ${proxies} were likely never audited for correlation with protected attributes. High correlation means they predict gender/caste better than job performance.</p>` : ''}
      <p>Historical label bias: The training data's label distribution may reflect past discrimination. The model learned historical patterns as ground truth and reproduces them. No fairness constraint during training allowed it to optimise for historical patterns instead of treating individuals equally.</p>`;
  }

  // SHAP AI block
  const aiSHAP = document.getElementById('ai-shap');
  if (aiSHAP) {
    const topFeat = ev.shap?.topFeature || ev.shap?.top_feature || (fi[0]?.feature) || 'interview_score';
    const sensCount = sensitiveInShap.length;
    aiSHAP.innerHTML = `<p><strong style="color:var(--gold)">SHAP Interpretation:</strong></p>
      <p><code style="background:rgba(0,0,0,.1);padding:2px 5px;border-radius:3px;font-family:var(--mono)">${topFeat}</code> is the top predictive feature (SHAP stability: ${fmt(ev.shap?.featureStability,4)}).
      ${sensCount > 0 ? ` However, the presence of ${sensCount} protected attribute(s) in the top features is damning evidence that the model is learning protected attributes.` : ' No protected attributes detected in top features — good sign.'}</p>
      ${sensitiveInShap.length > 0 ? `<p>The SHAP values for sensitive features (${sensitiveInShap.slice(0,2).map(f=>`${f.feature}: ${fmt(f.shap_value,4)}`).join(', ')}) indicate these attributes are contributing to predictions. That sounds small but compounds across the entire prediction distribution.</p>` : ''}`;
  }

  // Counterfactual AI block
  const aiCF = document.getElementById('ai-counterfactual');
  if (aiCF) {
    const attrs = [...new Set(cfExamples.map(c=>c.attribute))];
    if (cfExamples.length > 0) {
      aiCF.innerHTML = `<p><strong style="color:var(--gold)">Legal &amp; Reputational Analysis:</strong></p>
        <p><strong style="color:var(--red)">US EEOC Exposure:</strong> The ${cfExamples.length} counterfactual pair(s) violate the disparate treatment standard under Title VII. If a lawsuit is filed, these pairs serve as smoking-gun evidence. Estimated liability: $50K–$500K per plaintiff.</p>
        ${attrs.includes('caste') || attrs.includes('caste_proxy') ? `<p><strong style="color:var(--red)">India Constitutional Exposure:</strong> Articles 15–17 prohibit caste discrimination. The SC/ST Act provides for criminal penalties: up to 5 years imprisonment + ₹5 crore fine.</p>` : ''}
        <p><strong style="color:var(--amber)">Reputational Risk:</strong> If these pairs become public through a lawsuit or audit leak, media coverage is likely. "AI discriminates in hiring" is a headline that harms brand trust and customer retention.</p>`;
    } else {
      aiCF.innerHTML = `<p><strong style="color:var(--gold)">Counterfactual Analysis:</strong></p><p style="color:rgba(255,255,255,.7)">No counterfactual bias pairs found — the model appears counterfactually fair across the tested attribute groups. Continue monitoring as new data is collected.</p>`;
    }
  }
}

/* ── NORMALISE API RESPONSE ── */
function normalise(raw) {
  const pick = (...paths) => { for (const p of paths) { const v = p.split('.').reduce((o,k)=>o?.[k], raw); if (v != null && Number(v) >= 0) return Number(v); } return null; };
  const fairness = raw.fairness || {};
  let shapRaw = raw.shap || {};
  let fi = shapRaw.feature_importance;
  if (fi && !Array.isArray(fi)) fi = Object.entries(fi).sort((a,b)=>b[1]-a[1]).map(([f,v])=>({feature:f,shap_value:v}));
  const shap = { topFeature: shapRaw.topFeature||shapRaw.top_feature, shapMax: shapRaw.shapMax||shapRaw.shap_max, shapMin: shapRaw.shapMin||shapRaw.shap_min, featureStability: shapRaw.featureStability||shapRaw.feature_stability, feature_importance: fi||[] };

  return {
    ethical_score: pick('ethical_score','fairness_score','fairness.fairness_score'),
    fairness_score: pick('fairness_score','fairness.fairness_score'),
    privacy_score: pick('privacy_score','privacy.privacy_score'),
    robustness_score: pick('robustness_score','robustness.robustness_score'),
    transparency_score: pick('transparency_score'),
    accountability_score: pick('accountability_score'),
    fairness, shap,
    privacy: raw.privacy || {},
    robustness: raw.robustness || {},
    remediation: raw.remediation || {},
    model_metrics: raw.model_metrics || raw.model_performance || {},
    records: raw.records || 0,
  };
}

/* ── INIT ── */
(async function init() {
  const evalId = new URLSearchParams(location.search).get('eval_id') || sessionStorage.getItem('eval_id');

  if (!evalId) {
    document.getElementById('app').innerHTML = `<div class="loading-state">
      <div style="font-size:2.5rem;margin-bottom:1rem;color:var(--amber)"><i class="fas fa-exclamation-circle"></i></div>
      <div style="font-family:var(--sans);font-size:1.25rem;font-weight:700;color:var(--navy);margin-bottom:.5rem">No evaluation found</div>
      <div style="font-size:.9rem;color:var(--muted);margin-bottom:1.5rem">Complete an evaluation on the upload page first.</div>
      <a href="upload.html" style="display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--navy);color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:.875rem"><i class="fas fa-play-circle"></i> Start evaluation</a>
    </div>`;
    return;
  }

  try {
    const [devRes, remRes, evlRes] = await Promise.allSettled([
      fetch(`${API}/report/developer/${evalId}`).then(r => r.json()),
      fetch(`${API}/remediation/${evalId}`).then(r => r.json()),
      fetch(`${API}/evaluate/${evalId}`).then(r => r.json()),
    ]);

    const dev = devRes.status === 'fulfilled' && devRes.value.status === 'complete' ? devRes.value : {};
    const rem = remRes.status === 'fulfilled' && remRes.value.status === 'complete' ? remRes.value : {};
    const evl = evlRes.status === 'fulfilled' && evlRes.value.status === 'complete' ? evlRes.value : {};

    const merged = { ...evl, ...rem, ...dev };
    const ev = normalise(merged);

    // Enrich from session cache
    const cached = sessionStorage.getItem('eval_result');
    if (cached) {
      try {
        const raw = JSON.parse(cached);
        if (!ev.ethical_score && raw.ethical_score) ev.ethical_score = raw.ethical_score;
        if (!ev.shap?.topFeature && raw.shap) ev.shap = normalise(raw).shap;
        if ((!ev.fairness || !Object.keys(ev.fairness).length) && raw.fairness) ev.fairness = raw.fairness;
        if (!ev.model_metrics?.accuracy && raw.model_metrics) ev.model_metrics = raw.model_metrics;
      } catch(e) {}
    }

    const fixes = (rem.remediation?.all_fixes?.length ? rem.remediation.all_fixes : null) || buildFallbackFixes(ev);
    const cfExamples = rem.counterfactual_examples || evl.counterfactual_examples || [];

    render(ev, fixes, cfExamples, evalId);

  } catch(err) {
    const cached = sessionStorage.getItem('eval_result');
    if (cached) {
      try {
        const raw = JSON.parse(cached);
        const ev = normalise(raw);
        const fixes = raw.remediation?.all_fixes || buildFallbackFixes(ev);
        const cfExamples = raw.counterfactual_examples || [];
        render(ev, fixes, cfExamples, evalId);
        return;
      } catch(e) {}
    }
    document.getElementById('app').innerHTML = `<div class="loading-state">
      <div style="font-size:2.5rem;margin-bottom:1rem;color:var(--red)"><i class="fas fa-times-circle"></i></div>
      <div style="font-family:var(--sans);font-size:1.25rem;font-weight:700;color:var(--navy);margin-bottom:.5rem">Could not load report</div>
      <div style="font-size:.9rem;color:var(--muted);margin-bottom:1.5rem">Evaluation not found or still processing. Error: ${err.message}</div>
      <a href="upload.html" style="display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--navy);color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:.875rem"><i class="fas fa-redo"></i> Try again</a>
    </div>`;
  }
})();

/* ── FALLBACK FIX GENERATION ── */
function buildFallbackFixes(ev) {
  const f = ev.fairness || {};
  const pr = ev.privacy || {};
  const rb = ev.robustness || {};
  const fixes = [];

  if ((pr.pii_columns||[]).length > 0) {
    fixes.push({ severity:'CRITICAL', dimension:'Privacy', dimension_key:'privacy_score', effort:'low', title:'Remove or pseudonymise PII columns', description:`${pr.pii_columns.length} column(s) containing personal data detected: ${pr.pii_columns.slice(0,3).join(', ')}. PII in training data violates GDPR and the IT Act, and causes unfair predictions if names/IDs leak into the model.`, code:`import hashlib\ndf.drop(columns=${JSON.stringify(pr.pii_columns.slice(0,3))}, inplace=True, errors='ignore')`, current_score: pr.privacy_score||.45, estimated_score_after: .80, risk:'None' });
  }
  if ((f.disparateImpact||1) < .80) {
    fixes.push({ severity:'CRITICAL', dimension:'Fairness', dimension_key:'disparateImpact', effort:'medium', title:'Fix disparate impact — 80% rule violation', description:`The approval rate ratio is ${((f.disparateImpact||0)*100).toFixed(1)}%. Legal EEOC threshold is ≥ 80%. This creates discrimination lawsuit exposure.`, code:`from fairlearn.postprocessing import ThresholdOptimizer\noptimizer = ThresholdOptimizer(estimator=model, constraints="demographic_parity")\noptimizer.fit(X_train, y_train, sensitive_features=sensitive_col)`, current_score: f.disparateImpact||0, estimated_score_after: Math.min((f.disparateImpact||0)+.20, 1), risk:'Low' });
  }
  if ((f.counterfactual||1) < .90) {
    fixes.push({ severity:'CRITICAL', dimension:'Fairness', dimension_key:'counterfactual', effort:'medium', title:'Remove proxy features sensitive to protected attributes', description:`Counterfactual fairness score is ${((f.counterfactual||0)*100).toFixed(1)}%. Changing a sensitive attribute flips model decisions — direct proxy discrimination evidence.`, code:`# Find proxy features\nfor col in X.columns:\n    corr = X[col].corr(df[sensitive_attr])\n    if abs(corr) > 0.3:\n        print(f"Proxy: {col} — r={corr:.3f}")`, current_score: f.counterfactual||0, estimated_score_after: Math.min((f.counterfactual||0)+.18, 1), risk:'Low' });
  }
  if ((rb.boundary_instability||0) > .25) {
    fixes.push({ severity:'WARNING', dimension:'Robustness', dimension_key:'robustness_score', effort:'low', title:'Calibrate predictions to stabilise boundary decisions', description:`${Math.round((rb.boundary_instability||0)*100)}% of predictions fall in the 0.4–0.6 uncertain zone. Minor input changes flip these decisions.`, code:`from sklearn.calibration import CalibratedClassifierCV\ncalibrated = CalibratedClassifierCV(estimator=your_model, method='isotonic', cv='prefit')\ncalibrated.fit(X_val, y_val)`, current_score: rb.robustness_score||.5, estimated_score_after: Math.min((rb.robustness_score||.5)+.20, 1), risk:'None' });
  }
  if (!fixes.length) {
    fixes.push({ severity:'INFO', dimension:'Monitoring', dimension_key:'', effort:'low', title:'Set up continuous fairness monitoring', description:'No critical issues found. Implement weekly re-evaluation as new data arrives to catch drift early.', code:`import schedule\n\ndef fairness_check():\n    df_prod = load_production_batch()\n    result = run_fairness_eval(df_prod)\n    for dim, score in result.items():\n        if score < 0.75:\n            alert(f"DRIFT: {dim} = {score:.2%}")\n\nschedule.every().monday.at("09:00").do(fairness_check)`, current_score: .85, estimated_score_after: .90, risk:'None' });
  }
  return fixes;
}
</script>
